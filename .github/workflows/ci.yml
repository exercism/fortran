name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            runs-on: ubuntu-24.04

          - os: macos
            runs-on: macos-15

    name: ${{ matrix.os }}
    runs-on: ${{ matrix.runs-on }}
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Install GFortran (macOS)
        if: matrix.os == 'macos'
        run: |
          brew install gcc@15
          FC_PATH="$(command -v gfortran-15)"
          echo "FC=$FC_PATH" >> "$GITHUB_ENV"

      - name: Verify all exercises
        run: |
          mkdir build
          cd build
          cmake ..
          cmake --build .
          ctest -V
